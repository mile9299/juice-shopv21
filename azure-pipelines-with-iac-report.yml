trigger:
  branches:
    include:
    - "*"

pool:
  vmImage: ubuntu-latest

variables:
  - group: "Pipeline_Scanning_Variables" # specific to Azure DevOps
  - name: JUICE_SHOP_REPO
    value: 'https://github.com/mile9299/juice-shopv21.git'
  - name: DOCKER_PORT
    value: '3000' # Default Docker port
  - name: CS_IMAGE_NAME
    value: 'mile/cs-fcs'
  - name: CS_IMAGE_TAG
    value: '2.1.0'
  - name: CS_USERNAME
    value: 'mile'
  - name: FALCON_REGION
    value: 'us-1'
  - name: PROJECT_PATH
    value: 'git::https://github.com/mile9299/IAC_Examples.git'

stages:
- stage: Build
  jobs:
  - job: BuildAndTest
    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.0.0'

    - task: Bash@3
      displayName: 'Checkout Juice Shop Repo'
      inputs:
        targetType: 'inline'
        script: |
          git clone $(JUICE_SHOP_REPO) juice-shop
          cd juice-shop

    - task: Bash@3
      displayName: 'Falcon Cloud Security IaC Scan'
      inputs:
        targetType: 'inline'
        script: |
          set +x
          # check if required env vars are set in the build set-up

          scan_status=0
          if [[ -z "$(CS_USERNAME)" || -z "$(CS_PASSWORD)" || -z "$(CS_REGISTRY)" || -z "$(CS_IMAGE_NAME)" || -z "$(CS_IMAGE_TAG)" || -z "$(FALCON_CLIENT_ID)" || -z "$(FALCON_CLIENT_SECRET)" || -z "$(FALCON_REGION)" || -z "$(PROJECT_PATH)" ]]; then
              echo "Error: required environment variables/params are not set"
              exit 1
          else
              # login to crowdstrike registry
              echo "Logging in to crowdstrike registry with username: $(CS_USERNAME)"
              echo "$(CS_PASSWORD)" | docker login --username "$(CS_USERNAME)" --password-stdin

              if [ $? -eq 0 ]; then
                  echo "Docker login successful"
                  #  pull the fcs container target
                  echo "Pulling fcs container target from crowdstrike"
                  docker pull $(CS_IMAGE_NAME):$(CS_IMAGE_TAG)
                  if [ $? -eq 0 ]; then
                      echo "fcs docker container image pulled successfully"
                      echo "=============== FCS IaC Scan Starts ==============="
                      docker run --network=host --rm "$(CS_IMAGE_NAME)":"$(CS_IMAGE_TAG)" --client-id "$(FALCON_CLIENT_ID)" --client-secret "$(FALCON_CLIENT_SECRET)" --falcon-region "$(FALCON_REGION)" iac scan -p "$(PROJECT_PATH)" --upload-results  | tee $(Build.SourcesDirectory)/scansummary.txt
                      echo "=============== FCS IaC Scan Ends ==============="
                      echo "fcs-iac-scan-status: $scan_status"
                      if [ $scan_status -eq 40 ]; then
                          echo "Scan succeeded & vulnerabilities count are ABOVE the '--fail-on' threshold; Pipeline will be marked as Success, but this stage will be marked as Unstable"
                          exit 0
                      elif [ $scan_status -eq 0 ]; then
                          echo "Scan succeeded & vulnerabilities count are BELOW the '--fail-on' threshold; Pipeline will be marked as Success"
                          exit 0
                      else
                          echo "Unexpected scan exit code: $scan_status"
                          exit 1
                      fi
                  else
                      echo "Error: failed to pull fcs docker image from crowdstrike"
                      exit 1
                  fi
              else
                  echo "Error: docker login failed"
                  exit 1
              fi
          fi

    - task: Bash@3
      displayName: 'Process SARIF file'
      inputs:
        targetType: 'inline'
        script: |
          # Check if scansummary.txt exists
          if [ -f "$(Build.SourcesDirectory)/scansummary.txt" ]; then
            # Try to extract SARIF file path
            SARIFFILE=$(grep -o 'Results saved to file: [^ ]*' $(Build.SourcesDirectory)/scansummary.txt | sed 's/Results saved to file: //')

            # If SARIF file path was found and file exists
            if [ -n "$SARIFFILE" ] && [ -f "$SARIFFILE" ]; then
              echo "Found SARIF file: $SARIFFILE"
              jq '.runs[].tool.driver.informationUri = "https://www.crowdstrike.com"' $SARIFFILE > $(Build.SourcesDirectory)/results.sarif
              echo "Successfully processed SARIF file to results.sarif"
            else
              # Create an empty valid SARIF file
              echo "SARIF file not found in scan output, creating a minimal valid SARIF file"
              echo '{
                "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
                "version": "2.1.0",
                "runs": [
                  {
                    "tool": {
                      "driver": {
                        "name": "CrowdStrike Falcon",
                        "informationUri": "https://www.crowdstrike.com",
                        "rules": []
                      }
                    },
                    "results": []
                  }
                ]
              }' > $(Build.SourcesDirectory)/results.sarif
            fi
          else
            echo "Scan summary file not found, creating a minimal valid SARIF file"
            echo '{
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                {
                  "tool": {
                    "driver": {
                      "name": "CrowdStrike Falcon",
                      "informationUri": "https://www.crowdstrike.com",
                      "rules": []
                    }
                  },
                  "results": []
                }
              ]
            }' > $(Build.SourcesDirectory)/results.sarif
          fi
      continueOnError: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish SARIF results'
      inputs:
        pathToPublish: '$(Build.SourcesDirectory)/results.sarif'
        artifactName: 'CodeAnalysisLogs'
        publishLocation: 'Container'
      continueOnError: true

    - task: Bash@3
      displayName: 'Return IAC Scan Summary'
      inputs:
        targetType: 'inline'
        script: |
          if [ -f "$(Build.SourcesDirectory)/scansummary.txt" ]; then
            cat "$(Build.SourcesDirectory)/scansummary.txt"
          else
            echo "Scan summary file not found"
          fi
      continueOnError: true

    - task: Bash@3
      displayName: 'Return IAC Sarif Results'
      inputs:
        targetType: 'inline'
        script: |
          if [ -f "$(Build.SourcesDirectory)/results.sarif" ]; then
            cat "$(Build.SourcesDirectory)/results.sarif"
          else
            echo "SARIF file not found"
          fi
      continueOnError: true

    # NEW TASK: Generate IaC Security Report from Falcon API
    - task: UsePythonVersion@0
      displayName: 'Use Python 3.x'
      inputs:
        versionSpec: '3.x'
        addToPath: true

    - task: Bash@3
      displayName: 'Generate IaC Security Report from Falcon API'
      inputs:
        targetType: 'inline'
        script: |
          set +x
          echo "========================================================================"
          echo "Generating IaC Security Report from Falcon API"
          echo "========================================================================"

          # Check if credentials are available
          if [[ -z "$(FALCON_CLIENT_ID)" || -z "$(FALCON_CLIENT_SECRET)" ]]; then
            echo "Error: Falcon API credentials not set"
            exit 1
          fi

          # Create Python script to generate IaC report
          cat > generate_iac_report.py << 'PYTHON_SCRIPT'
          #!/usr/bin/env python3
          import json
          import subprocess
          import os
          from datetime import datetime, timedelta
          from collections import Counter, defaultdict

          FALCON_CLIENT_ID = os.environ.get('FALCON_CLIENT_ID')
          FALCON_CLIENT_SECRET = os.environ.get('FALCON_CLIENT_SECRET')
          FALCON_REGION = os.environ.get('FALCON_REGION', 'us-1')

          # Set API base URL based on region
          if FALCON_REGION == 'us-2':
              FALCON_BASE_URL = "https://api.us-2.crowdstrike.com"
          elif FALCON_REGION == 'eu-1':
              FALCON_BASE_URL = "https://api.eu-1.crowdstrike.com"
          elif FALCON_REGION == 'us-gov-1':
              FALCON_BASE_URL = "https://api.laggar.gcw.crowdstrike.com"
          else:
              FALCON_BASE_URL = "https://api.crowdstrike.com"

          def query_iac_detections():
              print("Querying IaC detections from Falcon API...")

              # Get OAuth2 token
              token_cmd = f"""curl -s -X POST "{FALCON_BASE_URL}/oauth2/token" \
                  -H "accept: application/json" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "client_id={FALCON_CLIENT_ID}&client_secret={FALCON_CLIENT_SECRET}"
              """

              token_result = subprocess.run(token_cmd, shell=True, capture_output=True, text=True)
              token_data = json.loads(token_result.stdout)
              access_token = token_data.get('access_token')

              if not access_token:
                  print(f"Failed to get access token")
                  return []

              print("Successfully authenticated with Falcon API")

              # Query IaC detections
              detections_cmd = f"""curl -s -X GET "{FALCON_BASE_URL}/iac/combined/detections/v1?limit=5000&sort=last_detected.desc" \
                  -H "accept: application/json" \
                  -H "Authorization: Bearer {access_token}"
              """

              detections_result = subprocess.run(detections_cmd, shell=True, capture_output=True, text=True)
              detections_data = json.loads(detections_result.stdout)

              if detections_data.get('resources'):
                  detections = detections_data['resources']
                  print(f"Retrieved {len(detections)} IaC detections from Falcon API")
                  return detections
              else:
                  print(f"No detections found")
                  return []

          def generate_html_report(detections):
              severity_map = {0: 'Low', 1: 'Medium', 2: 'High', 3: 'Critical'}

              severity_counts = Counter()
              for det in detections:
                  sev_num = det.get('rule', {}).get('severity', 0)
                  sev_name = severity_map.get(sev_num, 'Unknown')
                  severity_counts[sev_name] += 1

              by_project = defaultdict(list)
              for det in detections:
                  project = det.get('project_name', 'Unknown Project')
                  by_project[project].append(det)

              by_file = defaultdict(list)
              for det in detections:
                  file_name = det.get('file_name', 'Unknown File')
                  by_file[file_name].append(det)

              by_rule = defaultdict(list)
              for det in detections:
                  rule_name = det.get('rule', {}).get('rule_name', 'Unknown Rule')
                  by_rule[rule_name].append(det)

              platform_counts = Counter(det.get('rule', {}).get('platform', 'Unknown') for det in detections)
              cloud_counts = Counter(det.get('rule', {}).get('cloud_provider', 'Unknown') for det in detections)
              service_counts = Counter(det.get('rule', {}).get('service', 'Unknown') for det in detections)

              if detections:
                  dates = [det.get('last_detected', '') for det in detections if det.get('last_detected')]
                  if dates:
                      earliest = min(dates)
                      latest = max(dates)
                      try:
                          earliest_dt = datetime.fromisoformat(earliest.replace('Z', '+00:00'))
                          latest_dt = datetime.fromisoformat(latest.replace('Z', '+00:00'))
                          date_range = f"{earliest_dt.strftime('%Y-%m-%d')} to {latest_dt.strftime('%Y-%m-%d')}"
                      except:
                          date_range = f"{earliest} to {latest}"
                  else:
                      date_range = "N/A"
              else:
                  date_range = "N/A"

              report_time = datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')
              build_id = os.environ.get('BUILD_BUILDID', 'N/A')
              pipeline_name = os.environ.get('BUILD_DEFINITIONNAME', 'N/A')

              html = f"""<!DOCTYPE html>
          <html>
          <head>
              <title>CrowdStrike FCS - IaC Security Report | Build {build_id}</title>
              <style>
                  body {{ font-family: 'Consolas', 'Monaco', 'Courier New', monospace; margin: 0; background-color: #0D1117; color: #C9D1D9; }}
                  .container {{ max-width: 1600px; margin: 0 auto; padding: 30px; }}
                  .header {{ background: linear-gradient(135deg, #E01F27 0%, #B01419 100%); color: white; padding: 30px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }}
                  .header h1 {{ margin: 0; font-size: 32px; font-weight: 700; font-family: 'Segoe UI', Arial, sans-serif; }}
                  .header .subtitle {{ margin: 10px 0 0 0; opacity: 0.95; font-size: 16px; }}
                  .header .pipeline-info {{ margin: 10px 0 0 0; opacity: 0.9; font-size: 13px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 4px; display: inline-block; }}

                  .executive-summary {{ background: #161B22; padding: 25px; border-radius: 8px; border-left: 4px solid #E01F27; margin-bottom: 25px; }}
                  .executive-summary h2 {{ margin: 0 0 20px 0; color: #E01F27; font-size: 22px; }}
                  .summary-stats {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }}
                  .stat-item {{ background: #0D1117; padding: 15px; border-radius: 6px; }}
                  .stat-label {{ color: #8B949E; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }}
                  .stat-value {{ color: #C9D1D9; font-size: 24px; font-weight: 700; }}
                  .stat-value.critical {{ color: #E01F27; }}

                  .summary-grid {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }}
                  .summary-card {{ background: #161B22; padding: 25px; border-radius: 8px; border-left: 4px solid #E01F27; }}
                  .summary-card.critical {{ border-left-color: #E01F27; }}
                  .summary-card.high {{ border-left-color: #FF3D3D; }}
                  .summary-card.medium {{ border-left-color: #FF6B00; }}
                  .summary-card.low {{ border-left-color: #FFC107; }}
                  .summary-card h3 {{ margin: 0 0 12px 0; font-size: 13px; color: #8B949E; text-transform: uppercase; }}
                  .summary-card .value {{ font-size: 42px; font-weight: bold; color: #C9D1D9; }}
                  .summary-card .subtext {{ font-size: 11px; color: #8B949E; margin-top: 10px; }}

                  .section {{ background: #161B22; padding: 25px; border-radius: 8px; margin-bottom: 20px; }}
                  .section h2 {{ color: #E01F27; border-bottom: 2px solid #30363D; padding-bottom: 12px; margin-top: 0; font-size: 20px; }}

                  table {{ width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 12px; }}
                  th {{ background: #0D1117; color: #8B949E; padding: 12px; text-align: left; font-weight: 600; text-transform: uppercase; font-size: 11px; border-bottom: 2px solid #30363D; }}
                  td {{ padding: 12px; border-bottom: 1px solid #21262D; }}
                  tr:hover {{ background: #161B22; }}

                  .severity-badge {{ padding: 5px 12px; border-radius: 3px; font-size: 11px; font-weight: 700; text-transform: uppercase; }}
                  .severity-critical {{ background: #E01F27; color: white; }}
                  .severity-high {{ background: #FF3D3D; color: white; }}
                  .severity-medium {{ background: #FF6B00; color: white; }}
                  .severity-low {{ background: #FFC107; color: #000; }}

                  .footer {{ text-align: center; color: #6E7681; margin-top: 30px; padding: 20px; background: #0D1117; border-radius: 8px; font-size: 11px; }}
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🛡️ CrowdStrike Falcon Cloud Security (FCS)</h1>
                      <div class="subtitle">Infrastructure as Code Security Report</div>
                      <div class="pipeline-info">🔄 Pipeline: {pipeline_name} | Build: #{build_id}</div>
                  </div>

                  <div class="executive-summary">
                      <h2>Executive Summary</h2>
                      <div class="summary-stats">
                          <div class="stat-item">
                              <div class="stat-label">Total Violations</div>
                              <div class="stat-value critical">{len(detections)}</div>
                          </div>
                          <div class="stat-item">
                              <div class="stat-label">Projects Scanned</div>
                              <div class="stat-value">{len(by_project)}</div>
                          </div>
                          <div class="stat-item">
                              <div class="stat-label">Files Affected</div>
                              <div class="stat-value">{len(by_file)}</div>
                          </div>
                          <div class="stat-item">
                              <div class="stat-label">Unique Rules Violated</div>
                              <div class="stat-value">{len(by_rule)}</div>
                          </div>
                      </div>
                  </div>

                  <div class="summary-grid">
                      <div class="summary-card critical">
                          <h3>Critical Severity</h3>
                          <div class="value">{severity_counts.get('Critical', 0)}</div>
                          <div class="subtext">Immediate remediation required</div>
                      </div>
                      <div class="summary-card high">
                          <h3>High Severity</h3>
                          <div class="value">{severity_counts.get('High', 0)}</div>
                          <div class="subtext">Must be addressed soon</div>
                      </div>
                      <div class="summary-card medium">
                          <h3>Medium Severity</h3>
                          <div class="value">{severity_counts.get('Medium', 0)}</div>
                          <div class="subtext">Should be fixed</div>
                      </div>
                      <div class="summary-card low">
                          <h3>Low Severity</h3>
                          <div class="value">{severity_counts.get('Low', 0)}</div>
                          <div class="subtext">Minor issues</div>
                      </div>
                  </div>

                  <div class="section">
                      <h2>📊 Scan Coverage</h2>
                      <table>
                          <thead>
                              <tr>
                                  <th>Category</th>
                                  <th>Count</th>
                                  <th>Details</th>
                              </tr>
                          </thead>
                          <tbody>
                              <tr>
                                  <td><strong>IaC Platforms</strong></td>
                                  <td>{len(platform_counts)}</td>
                                  <td>{', '.join(f'{k}: {v}' for k, v in platform_counts.most_common())}</td>
                              </tr>
                              <tr>
                                  <td><strong>Cloud Providers</strong></td>
                                  <td>{len(cloud_counts)}</td>
                                  <td>{', '.join(f'{k}: {v}' for k, v in cloud_counts.most_common())}</td>
                              </tr>
                              <tr>
                                  <td><strong>Cloud Services</strong></td>
                                  <td>{len(service_counts)}</td>
                                  <td>{', '.join(f'{k}: {v}' for k, v in service_counts.most_common(10))}</td>
                              </tr>
                          </tbody>
                      </table>
                  </div>

                  <div class="section">
                      <h2>🚨 Top 20 Most Common Violations</h2>
                      <table>
                          <thead>
                              <tr>
                                  <th>Severity</th>
                                  <th>Rule</th>
                                  <th>Platform</th>
                                  <th>Service</th>
                                  <th>Count</th>
                              </tr>
                          </thead>
                          <tbody>
          """

              sorted_rules = sorted(by_rule.items(), key=lambda x: len(x[1]), reverse=True)[:20]

              for rule_name, dets in sorted_rules:
                  rule = dets[0].get('rule', {})
                  severity_num = rule.get('severity', 0)
                  severity_name = severity_map.get(severity_num, 'Unknown').lower()
                  platform = rule.get('platform', 'Unknown')
                  service = rule.get('service', 'Unknown')

                  html += f"""
                              <tr>
                                  <td><span class="severity-badge severity-{severity_name}">{severity_name.upper()}</span></td>
                                  <td><strong>{rule_name}</strong></td>
                                  <td>{platform}</td>
                                  <td>{service}</td>
                                  <td><strong>{len(dets)}</strong></td>
                              </tr>
                  """

              html += f"""
                          </tbody>
                      </table>
                  </div>

                  <div class="footer">
                      <p><strong>CrowdStrike Falcon Cloud Security (FCS)</strong></p>
                      <p>Infrastructure as Code Security Report - Azure DevOps Pipeline</p>
                      <p>Pipeline: {pipeline_name} | Build: #{build_id}</p>
                      <p>Scan Period: {date_range} | Report Generated: {report_time}</p>
                  </div>
              </div>
          </body>
          </html>
              """

              return html

          if __name__ == "__main__":
              detections = query_iac_detections()

              if detections:
                  html_report = generate_html_report(detections)

                  with open('iac_security_report.html', 'w') as f:
                      f.write(html_report)

                  with open('iac_detections.json', 'w') as f:
                      json.dump(detections, f, indent=2)

                  print(f"\nIaC Security Report Generated Successfully!")
                  print(f"Total Violations: {len(detections)}")
                  print(f"Report saved to: iac_security_report.html")
              else:
                  print("No IaC detections found or API query failed")
          PYTHON_SCRIPT

          # Run the Python script
          export FALCON_CLIENT_ID="$(FALCON_CLIENT_ID)"
          export FALCON_CLIENT_SECRET="$(FALCON_CLIENT_SECRET)"
          export FALCON_REGION="$(FALCON_REGION)"

          python3 generate_iac_report.py

          # Move generated files to artifacts staging directory
          if [ -f "iac_security_report.html" ]; then
            cp iac_security_report.html $(Build.ArtifactStagingDirectory)/
            echo "IaC Security Report copied to artifacts"
          fi

          if [ -f "iac_detections.json" ]; then
            cp iac_detections.json $(Build.ArtifactStagingDirectory)/
            echo "IaC Detections JSON copied to artifacts"
          fi
      continueOnError: true
      env:
        FALCON_CLIENT_ID: $(FALCON_CLIENT_ID)
        FALCON_CLIENT_SECRET: $(FALCON_CLIENT_SECRET)
        FALCON_REGION: $(FALCON_REGION)

    - task: PublishBuildArtifacts@1
      displayName: 'Publish IaC Security Report'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/iac_security_report.html'
        artifactName: 'IaC_Security_Report'
        publishLocation: 'Container'
      condition: succeededOrFailed()
      continueOnError: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish IaC Detections JSON'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/iac_detections.json'
        artifactName: 'IaC_Detections_Data'
        publishLocation: 'Container'
      condition: succeededOrFailed()
      continueOnError: true

    - task: Docker@2
      displayName: 'Build container image using Docker'
      inputs:
        repository: $(CONTAINER_REPO)
        command: 'build'
        Dockerfile: '**/Dockerfile'
        tags: $(CONTAINER_TAG)
      continueOnError: true

    - task: Bash@3
      displayName: 'Scan container image with CrowdStrike Container Image Scan'
      inputs:
        targetType: 'inline'
        script: |
          export FALCON_CLIENT_SECRET=$(FALCON_CLIENT_SECRET)
          export FALCON_CLIENT_ID=$(FALCON_CLIENT_ID)
          pip3 install docker crowdstrike-falconpy
          pip install retry
          if [ ! -d container-image-scan ] ; then
            git clone https://github.com/crowdstrike/container-image-scan
          fi

          # Run the scan but don't fail on non-zero exit
          python3 container-image-scan/cs_scanimage.py --json-report $(Build.SourcesDirectory)/report.json || true

          # Process the report
          if [ -f "$(Build.SourcesDirectory)/report.json" ]; then
            # Create remediation plan in the working directory
            echo "# Vulnerability Remediation Plan" > $(Build.SourcesDirectory)/remediation_plan.md

            # Check for vulnerabilities
            if jq -e '.vulnerabilities' $(Build.SourcesDirectory)/report.json > /dev/null 2>&1; then
              echo "Vulnerabilities found in the image:"
              jq -r '.vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | "- \(.severity): \(.cve_id) in \(.package_name) \(.package_version)"' $(Build.SourcesDirectory)/report.json

              echo "## High and Critical Vulnerabilities" >> $(Build.SourcesDirectory)/remediation_plan.md
              jq -r '.vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | "- **\(.severity)**: \(.cve_id) in \(.package_name) \(.package_version)\n  - Description: \(.description)\n  - Remediation: Update to latest version or apply patch"' $(Build.SourcesDirectory)/report.json >> $(Build.SourcesDirectory)/remediation_plan.md
            fi

            # Check for secrets
            if jq -e '.secrets' $(Build.SourcesDirectory)/report.json > /dev/null 2>&1; then
              echo "WARNING: Secrets were detected in the image:"
              jq -r '.secrets[] | "- Secret type: \(.type) in \(.path)"' $(Build.SourcesDirectory)/report.json

              echo "## Detected Secrets" >> $(Build.SourcesDirectory)/remediation_plan.md
              jq -r '.secrets[] | "- Secret type: \(.type) found in \(.path)\n  - Action: Remove this secret and use secure storage methods instead"' $(Build.SourcesDirectory)/report.json >> $(Build.SourcesDirectory)/remediation_plan.md

              echo "##vso[task.setvariable variable=SECRETS_FOUND]true"
            else
              echo "No secrets were detected in the image."
            fi
          else
            echo "Error: Scan report not generated."
            echo "# No security findings to report" > $(Build.SourcesDirectory)/remediation_plan.md
          fi
      continueOnError: true

    - task: Bash@3
      displayName: 'Verify Remediation Plan'
      inputs:
        targetType: 'inline'
        script: |
          if [ -f "$(Build.SourcesDirectory)/remediation_plan.md" ]; then
            echo "Remediation plan file exists"
          else
            echo "Creating empty remediation plan"
            echo "# No security findings to report" > $(Build.SourcesDirectory)/remediation_plan.md
          fi
      continueOnError: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Remediation Plan'
      inputs:
        pathToPublish: '$(Build.SourcesDirectory)/remediation_plan.md'
        artifactName: 'SecurityRemediationPlan'
        publishLocation: 'Container'
      continueOnError: true

    - task: Bash@3
      displayName: 'Print CrowdStrike Full Image Scan Report'
      inputs:
        targetType: 'inline'
        script: |
          if [ -f "$(Build.SourcesDirectory)/report.json" ]; then
            jq '.' $(Build.SourcesDirectory)/report.json
          else
            echo "Image scan report not found"
          fi
      continueOnError: true

    - task: Bash@3
      displayName: 'Tag container image'
      inputs:
        targetType: 'inline'
        script: |
          if [ -n "$(CONTAINER_REPO)" ] && [ -n "$(azureContainerRegistry)" ]; then
            docker tag $(CONTAINER_REPO) $(azureContainerRegistry)/$(CONTAINER_REPO)
            echo "Container image tagged successfully"
          else
            echo "Missing container repository or registry information"
          fi
      continueOnError: true

    - task: Bash@3
      name: policy
      displayName: 'Return API response from CrowdStrike Image Assessment'
      inputs:
        targetType: 'inline'
        script: |
          export FALCON_CLIENT_SECRET=$(FALCON_CLIENT_SECRET)
          export FALCON_CLIENT_ID=$(FALCON_CLIENT_ID)
          export API_BASE_URL=$(API_BASE_URL)
          export YOUR_CLOUD=$(YOUR_CLOUD)

          if [ -z "$FALCON_CLIENT_SECRET" ] || [ -z "$FALCON_CLIENT_ID" ] || [ -z "$API_BASE_URL" ] || [ -z "$YOUR_CLOUD" ]; then
            echo "Missing required environment variables for API call"
            echo "##vso[task.setvariable variable=failBuild;isOutput=true]false"
            exit 0
          fi

          RESPONSE=$(curl \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "client_id=${FALCON_CLIENT_ID}&client_secret=${FALCON_CLIENT_SECRET}" \
            --request POST \
            --silent ${API_BASE_URL}/oauth2/token)
          CS_JWT=$(echo ${RESPONSE} | jq -r '.access_token')

          if [ -z "$CS_JWT" ] || [ "$CS_JWT" == "null" ]; then
            echo "Failed to extract access token"
            echo "##vso[task.setvariable variable=failBuild;isOutput=true]false"
            exit 0
          fi
          ImageCheck=$(curl -s -X GET -H "authorization: Bearer ${CS_JWT}" \
            "https://container-upload.${YOUR_CLOUD}/policy-checks?policy_type=image-prevention-policy&repository=$CONTAINER_REPO&tag=$(CONTAINER_TAG)")

          export test=$(echo $ImageCheck | jq '.resources[0].deny')
          echo "Image assessment result: $test"
          echo "##vso[task.setvariable variable=failBuild;isOutput=true]$test"
      continueOnError: true

    - task: Bash@3
      displayName: 'Build'
      inputs:
        targetType: 'inline'
        script: |
          npm cache clean -f
          npm install
          # Start the application in the background using nohup
          nohup npm start > /dev/null 2>&1 &
          sleep 5
      continueOnError: true

    - task: Bash@3
      displayName: 'Deploy'
      inputs:
        targetType: 'inline'
        script: |
          docker stop juice-shop || true
          docker rm juice-shop || true

          docker build -t juice-shop .
          CONTAINER_ID=$(docker run -d -P --name juice-shop juice-shop)

          if [ $? -eq 0 ]; then
            DOCKER_HOST_PORT=$(docker port juice-shop 3000 | cut -d ':' -f 2)

            if [ -n "$DOCKER_HOST_PORT" ]; then
              echo "Juice Shop is running on http://localhost:$DOCKER_HOST_PORT"
              echo "##vso[task.setvariable variable=DOCKER_HOST_PORT;isOutput=true]$DOCKER_HOST_PORT"
            else
              echo "Failed to get container port mapping"
            fi
          else
            echo "Failed to start container"
          fi
      continueOnError: true

- stage: PostDeployment
  dependsOn: Build
  jobs:
  - job: Notify
    steps:
    - script: echo 'Build, test, and deployment successful!'
      displayName: 'Success Notification'

    - task: Bash@3
      displayName: 'Security Findings Summary'
      inputs:
        targetType: 'inline'
        script: |
          echo "## Security Scan Summary"
          echo ""
          echo "### IaC Security Report"
          echo "📊 A detailed IaC security report has been generated and published as a build artifact."
          echo "📥 Download the 'IaC_Security_Report' artifact to view the full HTML report."
          echo ""
          echo "### Container Image Scan"

          if [ -f "$(Pipeline.Workspace)/SecurityRemediationPlan/remediation_plan.md" ]; then
            cat "$(Pipeline.Workspace)/SecurityRemediationPlan/remediation_plan.md"
          else
            echo "No remediation plan found. Container scan may have completed without findings."
          fi

          echo ""
          echo "### Next Steps"
          echo "1. Review the IaC security report in the build artifacts"
          echo "2. Review the security findings in the remediation plan"
          echo "3. Address high and critical vulnerabilities"
          echo "4. Remove any detected secrets from container images"
          echo "5. Re-scan after remediation to verify fixes"
      continueOnError: true
