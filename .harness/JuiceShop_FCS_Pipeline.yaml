pipeline:
  name: JuiceShop - FCS Harness.io Pipeline
  identifier: JuiceShop_FCS_Pipeline
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: GITHUB
        repoName: juice-shopv21
        build:
          type: branch
          spec:
            branch: main
  variables:
    - name: JUICE_SHOP_REPO
      type: String
      description: ""
      required: false
      value: https://github.com/mile9299/juice-shopv21.git
    - name: DOCKER_PORT
      type: String
      description: ""
      required: false
      value: "3000"
    - name: CS_IMAGE_NAME
      type: String
      description: ""
      required: false
      value: mile/spooky
    - name: CS_IMAGE_TAG
      type: String
      description: ""
      required: false
      value: latest
    - name: DOCKER_USERNAME
      type: String
      description: ""
      required: false
      value: mile
    - name: FALCON_REGION
      type: String
      description: ""
      required: false
      value: us-1
    - name: PROJECT_PATH
      type: String
      description: ""
      required: false
      value: https://github.com/mile9299/IAC_Examples.git
    - name: FCS_SCANNER_IMAGE
      type: String
      description: ""
      required: false
      value: mile/cs-fcs
    - name: FCS_SCANNER_TAG
      type: String
      description: ""
      required: false
      value: 2.2.0
    - name: FALCON_CLIENT_ID
      type: String
      description: ""
      required: false
      value: <+secrets.getValue("account.FALCON_CLIENT_ID")>
    - name: FALCON_CLIENT_SECRET
      type: String
      description: ""
      required: false
      value: <+secrets.getValue("account.FALCON_CLIENT_SECRET")>
  stages:
    - stage:
        name: Build and Scan Stage
        identifier: build_stage
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          sharedPaths:
            - /harness/scan-results
          execution:
            steps:
              - step:
                  type: Run
                  name: CrowdStrike IaC Scan
                  identifier: crowdstrike_iac_scan
                  spec:
                    connectorRef: account.harnessImage
                    image: docker:24-dind
                    shell: Sh
                    command: |-
                      set +x
                      echo "Starting CrowdStrike IaC Scan..."

                      dockerd-entrypoint.sh &
                      DOCKER_PID=$!

                      for i in $(seq 1 30); do
                        if docker info >/dev/null 2>&1; then
                          echo "✓ Docker daemon is ready"
                          break
                        fi
                        sleep 2
                      done

                      if ! docker info >/dev/null 2>&1; then
                        echo "Error: Docker daemon failed to start"
                        exit 1
                      fi

                      echo "$DOCKERHUB_PASSWORD" | docker login docker.io --username "$DOCKERHUB_USERNAME" --password-stdin

                      SCANNER_IMAGE="${FCS_SCANNER_IMAGE}:${FCS_SCANNER_TAG}"
                      docker pull "$SCANNER_IMAGE"

                      echo "=============== FCS IaC Scan Starts ==============="

                      set +e
                      docker run --network=host --rm \
                        -v "$(pwd):/scan" \
                        -w /scan \
                        -e FALCON_CLIENT_ID="$FALCON_CLIENT_ID" \
                        -e FALCON_CLIENT_SECRET="$FALCON_CLIENT_SECRET" \
                        -e FALCON_CLOUD_REGION="$FALCON_REGION" \
                        "$SCANNER_IMAGE" \
                        --client-id "$FALCON_CLIENT_ID" \
                        --client-secret "$FALCON_CLIENT_SECRET" \
                        --falcon-region "$FALCON_REGION" \
                        iac scan -p "$PROJECT_PATH" --upload-results > scansummary.txt 2>&1

                      scan_status=$?
                      set -e

                      cat scansummary.txt

                      mkdir -p /harness/scan-results
                      cp scansummary.txt /harness/scan-results/ 2>/dev/null || true

                      echo "=============== FCS IaC Scan Ends ==============="
                      echo "Scan status: $scan_status"

                      kill $DOCKER_PID 2>/dev/null || true

                      export SCAN_STATUS="success"
                    privileged: true
                    envVariables:
                      DOCKERHUB_USERNAME: <+pipeline.variables.DOCKER_USERNAME>
                      DOCKERHUB_PASSWORD: <+secrets.getValue("account.dockerhub_password")>
                      FCS_SCANNER_IMAGE: <+pipeline.variables.FCS_SCANNER_IMAGE>
                      FCS_SCANNER_TAG: <+pipeline.variables.FCS_SCANNER_TAG>
                      FALCON_CLIENT_ID: <+secrets.getValue("account.cs_username")>
                      FALCON_CLIENT_SECRET: <+secrets.getValue("account.cs_password")>
                      FALCON_REGION: <+pipeline.variables.FALCON_REGION>
                      PROJECT_PATH: <+pipeline.variables.PROJECT_PATH>
                    outputVariables:
                      - name: SCAN_STATUS
                  timeout: 20m
              - step:
                  type: Run
                  name: Process IaC Scan Results
                  identifier: process_iac_results
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine
                    shell: Sh
                    command: |-
                      set +x
                      apk add --no-cache jq

                      echo "=== Processing IaC Scan Results ==="

                      if [ -f /harness/scan-results/scansummary.txt ]; then
                        cp /harness/scan-results/scansummary.txt .
                      fi

                      if [ ! -f scansummary.txt ]; then
                        echo "No scan summary found"
                        export FINDINGS_COUNT=0
                        export CRITICAL_FINDINGS=0
                        export HIGH_FINDINGS=0
                        export MEDIUM_FINDINGS=0
                        export LOW_FINDINGS=0
                        exit 0
                      fi

                      cat scansummary.txt

                      TOTAL=$(grep "Total:" scansummary.txt | grep -oE '[0-9]+' | head -1 || echo 0)
                      CRITICAL=$(grep "Critical:" scansummary.txt | grep -oE '[0-9]+' | head -1 || echo 0)
                      HIGH=$(grep "High:" scansummary.txt | grep -oE '[0-9]+' | head -1 || echo 0)
                      MEDIUM=$(grep "Medium:" scansummary.txt | grep -oE '[0-9]+' | head -1 || echo 0)
                      INFORMATIONAL=$(grep "Informational:" scansummary.txt | grep -oE '[0-9]+' | head -1 || echo 0)

                      echo ""
                      echo "=== IaC Scan Summary ==="
                      echo "Total: $TOTAL | Critical: $CRITICAL | High: $HIGH | Medium: $MEDIUM | Info: $INFORMATIONAL"

                      export FINDINGS_COUNT=$TOTAL
                      export CRITICAL_FINDINGS=$CRITICAL
                      export HIGH_FINDINGS=$HIGH
                      export MEDIUM_FINDINGS=$MEDIUM
                      export LOW_FINDINGS=$INFORMATIONAL
                    outputVariables:
                      - name: FINDINGS_COUNT
                      - name: CRITICAL_FINDINGS
                      - name: HIGH_FINDINGS
                      - name: MEDIUM_FINDINGS
                      - name: LOW_FINDINGS
                  timeout: 5m
              - step:
                  type: Run
                  name: Crowdstrike Image Assessment Prep
                  identifier: build_container_image_docker
                  spec:
                    connectorRef: account.harnessImage
                    image: docker:24-dind
                    shell: Sh
                    command: |-
                      set +x
                      echo "Building container image..."

                      dockerd-entrypoint.sh &
                      DOCKER_PID=$!

                      for i in $(seq 1 30); do
                        if docker info >/dev/null 2>&1; then
                          echo "✓ Docker daemon is ready"
                          break
                        fi
                        sleep 2
                      done

                      if ! docker info >/dev/null 2>&1; then
                        echo "Error: Docker daemon failed to start"
                        exit 1
                      fi

                      echo "$DOCKERHUB_PASSWORD" | docker login docker.io --username "$DOCKERHUB_USERNAME" --password-stdin

                      echo "Building image: ${CONTAINER_REPO}:${CONTAINER_TAG}"
                      docker build -t "${CONTAINER_REPO}:${CONTAINER_TAG}" -f Dockerfile .

                      if [ $? -eq 0 ]; then
                        echo "✓ Container image built successfully"
                        echo "Pushing image to Docker Hub..."
                        docker push "${CONTAINER_REPO}:${CONTAINER_TAG}"

                        if [ $? -eq 0 ]; then
                          echo "✓ Image pushed successfully"
                          export BUILD_STATUS="success"
                        else
                          echo "✗ Image push failed"
                          export BUILD_STATUS="push_failed"
                        fi
                      else
                        echo "✗ Container image build failed"
                        export BUILD_STATUS="failed"
                      fi

                      kill $DOCKER_PID 2>/dev/null || true
                    privileged: true
                    envVariables:
                      DOCKERHUB_USERNAME: <+pipeline.variables.DOCKER_USERNAME>
                      DOCKERHUB_PASSWORD: <+secrets.getValue("account.dockerhub_password")>
                      CONTAINER_REPO: <+pipeline.variables.CS_IMAGE_NAME>
                      CONTAINER_TAG: <+pipeline.variables.CS_IMAGE_TAG>
                    outputVariables:
                      - name: BUILD_STATUS
                  timeout: 15m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Ignore
              - step:
                  type: Run
                  name: CrowdStrike Image Assessment Scan
                  identifier: scan_container_image_python
                  spec:
                    connectorRef: account.harnessImage
                    image: python:3.9-slim
                    shell: Bash
                    command: |-
                      set +x
                      echo "Starting CrowdStrike Container Image Scan..."

                      mkdir -p /harness/scan-results

                      echo "Installing system dependencies..."
                      apt-get update && apt-get install -y \
                        git \
                        jq \
                        docker.io \
                        ca-certificates \
                        curl

                      echo "Installing Python dependencies..."
                      pip3 install --no-cache-dir --upgrade pip
                      pip3 install --no-cache-dir \
                        docker \
                        crowdstrike-falconpy \
                        retry

                      echo "Starting Docker daemon..."
                      dockerd > /var/log/dockerd.log 2>&1 &
                      DOCKER_PID=$!

                      echo "Waiting for Docker daemon to start..."
                      for i in $(seq 1 45); do
                        if docker info >/dev/null 2>&1; then
                          echo "✓ Docker daemon is ready"
                          break
                        fi
                        if [ $i -eq 45 ]; then
                          echo "Error: Docker daemon failed to start after 90 seconds"
                          cat /var/log/dockerd.log || echo "No logs available"

                          export TOTAL_VULNERABILITIES=0
                          export CRITICAL_VULNERABILITIES=0
                          export HIGH_VULNERABILITIES=0
                          export SECRETS_FOUND="false"

                          echo "0" > /harness/scan-results/total_vulns.txt
                          echo "0" > /harness/scan-results/critical_vulns.txt
                          echo "0" > /harness/scan-results/high_vulns.txt
                          echo "false" > /harness/scan-results/secrets_found.txt

                          exit 0
                        fi
                        sleep 2
                      done

                      docker --version
                      docker info

                      if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_PASSWORD" ]; then
                        echo "Logging into Docker Hub..."
                        echo "$DOCKERHUB_PASSWORD" | docker login docker.io --username "$DOCKERHUB_USERNAME" --password-stdin
                      fi

                      echo "Pulling image to scan: ${IMAGE_NAME}:${IMAGE_TAG}"
                      docker pull "${IMAGE_NAME}:${IMAGE_TAG}" || {
                        echo "Warning: Failed to pull image"
                      }

                      echo "Cloning CrowdStrike container-image-scan repository..."
                      if [ ! -d container-image-scan ]; then
                        git clone https://github.com/crowdstrike/container-image-scan
                      fi

                      export FALCON_CLIENT_SECRET="$FALCON_CLIENT_SECRET"
                      export FALCON_CLIENT_ID="$FALCON_CLIENT_ID"
                      export FALCON_CLOUD_REGION="$FALCON_REGION"

                      IMAGE_REPO="$IMAGE_NAME"
                      IMAGE_TAG_VALUE="$IMAGE_TAG"

                      echo ""
                      echo "=== Scan Configuration ==="
                      echo "Image: ${IMAGE_REPO}:${IMAGE_TAG_VALUE}"
                      echo "Region: $FALCON_REGION"
                      echo "=========================="

                      python3 -c "import docker; print(f'Docker module version: {docker.__version__}')" || {
                        echo "Error: Failed to import docker module"
                        export TOTAL_VULNERABILITIES=0
                        export CRITICAL_VULNERABILITIES=0
                        export HIGH_VULNERABILITIES=0
                        export SECRETS_FOUND="false"

                        echo "0" > /harness/scan-results/total_vulns.txt
                        echo "0" > /harness/scan-results/critical_vulns.txt
                        echo "0" > /harness/scan-results/high_vulns.txt
                        echo "false" > /harness/scan-results/secrets_found.txt

                        exit 0
                      }

                      echo "Running container image scan..."
                      set +e
                      python3 container-image-scan/cs_scanimage.py \
                        --repo "$IMAGE_REPO" \
                        --tag "$IMAGE_TAG_VALUE" \
                        --cloud-region "$FALCON_REGION" \
                        --json-report report.json
                      scan_exit_code=$?
                      set -e

                      echo "Scan completed with exit code: $scan_exit_code"

                      echo "Stopping Docker daemon..."
                      kill $DOCKER_PID 2>/dev/null || true
                      wait $DOCKER_PID 2>/dev/null || true

                      if [ -f "report.json" ]; then
                        echo "✓ Scan report generated"
                        cp report.json /harness/scan-results/
                        cat report.json | jq '.' || cat report.json

                        echo "# Vulnerability Remediation Plan" > remediation_plan.md
                        echo "" >> remediation_plan.md
                        echo "Generated: $(date)" >> remediation_plan.md
                        echo "Image: ${IMAGE_REPO}:${IMAGE_TAG_VALUE}" >> remediation_plan.md
                        echo "" >> remediation_plan.md

                        if jq -e '.vulnerabilities' report.json > /dev/null 2>&1; then
                          jq -r '.vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | "- \(.severity): \(.cve_id) in \(.package_name) \(.package_version)"' report.json || true
                          echo "## High and Critical Vulnerabilities" >> remediation_plan.md
                          jq -r '.vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | "- **\(.severity)**: \(.cve_id) in \(.package_name) \(.package_version)\n  - Description: \(.description // "N/A")\n  - Remediation: Update to latest version or apply patch\n"' report.json >> remediation_plan.md || true

                          TOTAL_VULNS=$(jq '[.vulnerabilities[]] | length' report.json || echo 0)
                          CRITICAL_VULNS=$(jq '[.vulnerabilities[] | select(.severity == "CRITICAL")] | length' report.json || echo 0)
                          HIGH_VULNS=$(jq '[.vulnerabilities[] | select(.severity == "HIGH")] | length' report.json || echo 0)

                          export TOTAL_VULNERABILITIES=$TOTAL_VULNS
                          export CRITICAL_VULNERABILITIES=$CRITICAL_VULNS
                          export HIGH_VULNERABILITIES=$HIGH_VULNS

                          echo "$TOTAL_VULNS" > /harness/scan-results/total_vulns.txt
                          echo "$CRITICAL_VULNS" > /harness/scan-results/critical_vulns.txt
                          echo "$HIGH_VULNS" > /harness/scan-results/high_vulns.txt
                        else
                          export TOTAL_VULNERABILITIES=0
                          export CRITICAL_VULNERABILITIES=0
                          export HIGH_VULNERABILITIES=0
                          echo "0" > /harness/scan-results/total_vulns.txt
                          echo "0" > /harness/scan-results/critical_vulns.txt
                          echo "0" > /harness/scan-results/high_vulns.txt
                        fi

                        if jq -e '.secrets' report.json > /dev/null 2>&1; then
                          jq -r '.secrets[] | "- Secret type: \(.type) in \(.path)"' report.json || true
                          echo "" >> remediation_plan.md
                          echo "## Detected Secrets" >> remediation_plan.md
                          jq -r '.secrets[] | "- Secret type: \(.type) found in \(.path)\n  - Action: Remove this secret and use secure storage methods instead\n"' report.json >> remediation_plan.md || true
                          export SECRETS_FOUND="true"
                          echo "true" > /harness/scan-results/secrets_found.txt
                        else
                          export SECRETS_FOUND="false"
                          echo "false" > /harness/scan-results/secrets_found.txt
                        fi

                        cp remediation_plan.md /harness/scan-results/
                      else
                        echo "Error: Scan report not generated"
                        echo "# No security findings to report" > remediation_plan.md
                        cp remediation_plan.md /harness/scan-results/

                        export TOTAL_VULNERABILITIES=0
                        export CRITICAL_VULNERABILITIES=0
                        export HIGH_VULNERABILITIES=0
                        export SECRETS_FOUND="false"

                        echo "0" > /harness/scan-results/total_vulns.txt
                        echo "0" > /harness/scan-results/critical_vulns.txt
                        echo "0" > /harness/scan-results/high_vulns.txt
                        echo "false" > /harness/scan-results/secrets_found.txt
                      fi

                      echo "✓ Container image scan completed"
                    privileged: true
                    envVariables:
                      FALCON_CLIENT_ID: <+secrets.getValue("account.cs_username")>
                      FALCON_CLIENT_SECRET: <+secrets.getValue("account.cs_password")>
                      FALCON_REGION: <+pipeline.variables.FALCON_REGION>
                      IMAGE_NAME: <+pipeline.variables.CS_IMAGE_NAME>
                      IMAGE_TAG: <+pipeline.variables.CS_IMAGE_TAG>
                      DOCKERHUB_USERNAME: <+pipeline.variables.DOCKER_USERNAME>
                      DOCKERHUB_PASSWORD: <+secrets.getValue("account.dockerhub_password")>
                    outputVariables:
                      - name: TOTAL_VULNERABILITIES
                      - name: CRITICAL_VULNERABILITIES
                      - name: HIGH_VULNERABILITIES
                      - name: SECRETS_FOUND
                  timeout: 15m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Ignore
              - step:
                  type: Run
                  name: Process Container Scan Results
                  identifier: process_container_results
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine
                    shell: Sh
                    command: |-
                      set +x
                      apk add --no-cache jq

                      echo "=== Processing Container Scan Results ==="

                      if [ -f /harness/scan-results/report.json ]; then
                        cp /harness/scan-results/report.json .
                      fi

                      if [ ! -f report.json ]; then
                        echo "No scan report found, checking for saved results..."

                        if [ -f /harness/scan-results/total_vulns.txt ]; then
                          TOTAL=$(cat /harness/scan-results/total_vulns.txt)
                          CRITICAL=$(cat /harness/scan-results/critical_vulns.txt)
                          HIGH=$(cat /harness/scan-results/high_vulns.txt)
                          SECRETS_DETECTED=$(cat /harness/scan-results/secrets_found.txt)
                        else
                          echo "No saved results found either"
                          TOTAL=0
                          CRITICAL=0
                          HIGH=0
                          SECRETS_DETECTED="false"
                        fi
                      else
                        echo "Scan Report Summary:"
                        cat report.json | jq '.' || cat report.json

                        TOTAL=$(jq '[.vulnerabilities[]] | length' report.json 2>/dev/null || echo 0)
                        CRITICAL=$(jq '[.vulnerabilities[] | select(.severity == "CRITICAL")] | length' report.json 2>/dev/null || echo 0)
                        HIGH=$(jq '[.vulnerabilities[] | select(.severity == "HIGH")] | length' report.json 2>/dev/null || echo 0)

                        SECRETS=$(jq '[.secrets[]] | length' report.json 2>/dev/null || echo 0)
                        if [ "$SECRETS" -gt 0 ]; then
                          SECRETS_DETECTED="true"
                        else
                          SECRETS_DETECTED="false"
                        fi
                      fi

                      echo ""
                      echo "=== Container Scan Summary ==="
                      echo "Total Vulnerabilities: $TOTAL"
                      echo "Critical: $CRITICAL"
                      echo "High: $HIGH"
                      echo "Secrets Detected: $SECRETS_DETECTED"

                      export VULNERABILITIES=$TOTAL
                      export CRITICAL_VULNS=$CRITICAL
                      export HIGH_VULNS=$HIGH
                      export SECRETS_DETECTED=$SECRETS_DETECTED
                    outputVariables:
                      - name: VULNERABILITIES
                      - name: CRITICAL_VULNS
                      - name: HIGH_VULNS
                      - name: SECRETS_DETECTED
                  timeout: 5m
              - step:
                  type: Run
                  name: Verify Application Dependencies
                  identifier: verify_app_dependencies
                  spec:
                    connectorRef: account.harnessImage
                    image: node:18-alpine
                    shell: Sh
                    command: |-
                      set +x
                      echo "Verifying Juice Shop application..."

                      if [ ! -f package.json ]; then
                        echo "Error: package.json not found"
                        export APP_READY="false"
                        exit 0
                      fi

                      echo "Installing dependencies..."
                      npm install --production

                      echo ""
                      echo "Available npm scripts:"
                      npm run 2>&1 | grep -A 100 "Lifecycle scripts" || echo "No scripts found"

                      echo ""
                      echo "Running security audit..."
                      npm audit --production || true

                      echo ""
                      echo "✓ Application dependencies verified"
                      export APP_READY="true"
                    envVariables:
                      DOCKER_PORT: <+pipeline.variables.DOCKER_PORT>
                    outputVariables:
                      - name: APP_READY
                  timeout: 10m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Ignore
              - step:
                  type: Run
                  name: Generate HTML Security Report
                  identifier: generate_html_security_report
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine
                    shell: Sh
                    command: |-
                      set +x
                      apk add --no-cache curl > /dev/null 2>&1

                      echo "=== Generating HTML Security Report ==="

                      # Collect variables
                      PIPELINE_NAME="<+pipeline.name>"
                      EXECUTION_ID="<+pipeline.executionId>"
                      SCANNER_VERSION="mile/cs-fcs:2.2.0"
                      IMAGE_SCANNED="<+pipeline.variables.CS_IMAGE_NAME>:<+pipeline.variables.CS_IMAGE_TAG>"
                      REPORT_DATE=$(date -u "+%Y-%m-%d %H:%M:%S UTC")
                      IAC_TOTAL="<+execution.steps.process_iac_results.output.outputVariables.FINDINGS_COUNT>"
                      IAC_CRITICAL="<+execution.steps.process_iac_results.output.outputVariables.CRITICAL_FINDINGS>"
                      IAC_HIGH="<+execution.steps.process_iac_results.output.outputVariables.HIGH_FINDINGS>"
                      IAC_MEDIUM="<+execution.steps.process_iac_results.output.outputVariables.MEDIUM_FINDINGS>"
                      IAC_INFO="<+execution.steps.process_iac_results.output.outputVariables.LOW_FINDINGS>"
                      CONT_TOTAL="<+execution.steps.process_container_results.output.outputVariables.VULNERABILITIES>"
                      CONT_CRITICAL="<+execution.steps.process_container_results.output.outputVariables.CRITICAL_VULNS>"
                      CONT_HIGH="<+execution.steps.process_container_results.output.outputVariables.HIGH_VULNS>"
                      SECRETS_DETECTED="<+execution.steps.process_container_results.output.outputVariables.SECRETS_DETECTED>"
                      BUILD_STATUS="<+execution.steps.build_container_image_docker.output.outputVariables.BUILD_STATUS>"
                      APP_READY="<+execution.steps.verify_app_dependencies.output.outputVariables.APP_READY>"

                      # Determine overall risk level
                      OVERALL_RISK="LOW"
                      RISK_COLOR="#198754"
                      if [ "${IAC_CRITICAL:-0}" -gt 0 ] || [ "${CONT_CRITICAL:-0}" -gt 0 ] 2>/dev/null; then
                        OVERALL_RISK="CRITICAL"
                        RISK_COLOR="#dc3545"
                      elif [ "${IAC_HIGH:-0}" -gt 0 ] || [ "${CONT_HIGH:-0}" -gt 0 ] 2>/dev/null; then
                        OVERALL_RISK="HIGH"
                        RISK_COLOR="#fd7e14"
                      elif [ "${IAC_MEDIUM:-0}" -gt 0 ] 2>/dev/null; then
                        OVERALL_RISK="MEDIUM"
                        RISK_COLOR="#ffc107"
                      fi

                      # Badges
                      if [ "$SECRETS_DETECTED" = "true" ]; then
                        SECRETS_BADGE='<span style="background:#dc3545;color:#fff;padding:3px 10px;border-radius:12px;font-weight:bold;">&#9888; DETECTED</span>'
                      else
                        SECRETS_BADGE='<span style="background:#198754;color:#fff;padding:3px 10px;border-radius:12px;font-weight:bold;">&#10003; NONE</span>'
                      fi

                      if [ "$BUILD_STATUS" = "success" ]; then
                        BUILD_BADGE='<span style="background:#198754;color:#fff;padding:3px 10px;border-radius:12px;font-weight:bold;">&#10003; SUCCESS</span>'
                      else
                        BUILD_BADGE='<span style="background:#dc3545;color:#fff;padding:3px 10px;border-radius:12px;font-weight:bold;">&#10007; '"$BUILD_STATUS"'</span>'
                      fi

                      if [ "$APP_READY" = "true" ]; then
                        APP_BADGE='<span style="background:#198754;color:#fff;padding:3px 10px;border-radius:12px;font-weight:bold;">&#10003; READY</span>'
                      else
                        APP_BADGE='<span style="background:#ffc107;color:#000;padding:3px 10px;border-radius:12px;font-weight:bold;">&#9888; NOT READY</span>'
                      fi

                      # Remediation plan
                      REMEDIATION_HTML='<p style="color:#8b949e;">No remediation items identified.</p>'
                      if [ -f /harness/scan-results/remediation_plan.md ]; then
                        REMEDIATION_HTML=$(cat /harness/scan-results/remediation_plan.md | \
                          sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | \
                          sed 's/^## \(.*\)/<h4 style="color:#e63946;">\1<\/h4>/g' | \
                          sed 's/^# \(.*\)/<h3>\1<\/h3>/g' | \
                          sed 's/^\*\*\(.*\)\*\*/<strong>\1<\/strong>/g' | \
                          sed 's/^- \(.*\)/<li>\1<\/li>/g' | \
                          sed 's/^$/<br\/>/g')
                      fi

                      mkdir -p /harness/scan-results

                      # Write HTML to a script file first to avoid shell echo verbosity
                      REPORT_FILE="/harness/scan-results/crowdstrike_security_report.html"

                      # Use printf to write the HTML silently
                      printf '%s\n' '<!DOCTYPE html>' > "$REPORT_FILE"
                      printf '%s\n' '<html lang="en">' >> "$REPORT_FILE"
                      printf '%s\n' '<head>' >> "$REPORT_FILE"
                      printf '%s\n' '  <meta charset="UTF-8" />' >> "$REPORT_FILE"
                      printf '%s\n' '  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>' >> "$REPORT_FILE"
                      printf '%s\n' '  <title>CrowdStrike Security Scan Report</title>' >> "$REPORT_FILE"
                      printf '%s\n' '  <style>' >> "$REPORT_FILE"
                      printf '%s\n' '    * { box-sizing: border-box; margin: 0; padding: 0; }' >> "$REPORT_FILE"
                      printf '%s\n' '    body { font-family: "Segoe UI", Arial, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .header { background: linear-gradient(135deg, #e63946 0%, #1a1a2e 60%); padding: 36px 48px 28px 48px; display: flex; align-items: center; gap: 24px; border-bottom: 3px solid #e63946; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .header-logo { font-size: 2.8rem; font-weight: 900; color: #fff; letter-spacing: -1px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .header-logo span { color: #e63946; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .header-info { flex: 1; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .header-info h1 { font-size: 1.6rem; color: #fff; font-weight: 700; margin-bottom: 4px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .header-info p { color: #adb5bd; font-size: 0.92rem; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .risk-badge { color: #fff; padding: 10px 28px; border-radius: 24px; font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }' >> "$REPORT_FILE"
                      printf '%s\n' '    .container { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .meta-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px 20px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .meta-card .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .meta-card .value { font-size: 0.97rem; color: #e6edf3; font-weight: 600; word-break: break-all; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .section { background: #161b22; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 28px; overflow: hidden; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .section-header { background: #21262d; padding: 14px 24px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .section-header h2 { font-size: 1.05rem; color: #e6edf3; font-weight: 700; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .section-icon { font-size: 1.2rem; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .section-body { padding: 24px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 16px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .stat-card { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 18px 12px; text-align: center; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .stat-card .stat-number { font-size: 2.2rem; font-weight: 900; line-height: 1; margin-bottom: 6px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .stat-card .stat-label { font-size: 0.78rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.07em; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .color-critical { color: #dc3545; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .color-high { color: #fd7e14; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .color-medium { color: #ffc107; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .color-info { color: #0dcaf0; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .color-total { color: #e6edf3; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .status-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #21262d; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .status-row:last-child { border-bottom: none; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .status-label { color: #8b949e; font-size: 0.95rem; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .remediation-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 18px 20px; font-size: 0.92rem; line-height: 1.7; color: #c9d1d9; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .remediation-box h3 { color: #e6edf3; margin-bottom: 8px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .remediation-box h4 { color: #e63946; margin: 12px 0 4px 0; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .remediation-box li { margin-left: 18px; margin-bottom: 4px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .footer { text-align: center; color: #484f58; font-size: 0.82rem; padding: 24px 0 12px 0; border-top: 1px solid #21262d; margin-top: 12px; }' >> "$REPORT_FILE"
                      printf '%s\n' '    .footer strong { color: #e63946; }' >> "$REPORT_FILE"
                      printf '%s\n' '  </style>' >> "$REPORT_FILE"
                      printf '%s\n' '</head>' >> "$REPORT_FILE"
                      printf '%s\n' '<body>' >> "$REPORT_FILE"

                      # Header with dynamic risk color
                      printf '<div class="header">\n' >> "$REPORT_FILE"
                      printf '  <div class="header-logo">Crowd<span>Strike</span></div>\n' >> "$REPORT_FILE"
                      printf '  <div class="header-info"><h1>Security Scan Report</h1><p>Falcon Cloud Security &mdash; Infrastructure &amp; Container Analysis</p></div>\n' >> "$REPORT_FILE"
                      printf '  <div class="risk-badge" style="background:%s;">Overall Risk: %s</div>\n' "$RISK_COLOR" "$OVERALL_RISK" >> "$REPORT_FILE"
                      printf '</div>\n' >> "$REPORT_FILE"

                      # Container and metadata
                      printf '<div class="container">\n' >> "$REPORT_FILE"
                      printf '<div class="meta-grid">\n' >> "$REPORT_FILE"
                      printf '  <div class="meta-card"><div class="label">Pipeline</div><div class="value">%s</div></div>\n' "$PIPELINE_NAME" >> "$REPORT_FILE"
                      printf '  <div class="meta-card"><div class="label">Execution ID</div><div class="value">%s</div></div>\n' "$EXECUTION_ID" >> "$REPORT_FILE"
                      printf '  <div class="meta-card"><div class="label">Image Scanned</div><div class="value">%s</div></div>\n' "$IMAGE_SCANNED" >> "$REPORT_FILE"
                      printf '  <div class="meta-card"><div class="label">Scanner</div><div class="value">%s</div></div>\n' "$SCANNER_VERSION" >> "$REPORT_FILE"
                      printf '  <div class="meta-card"><div class="label">Report Generated</div><div class="value">%s</div></div>\n' "$REPORT_DATE" >> "$REPORT_FILE"
                      printf '</div>\n' >> "$REPORT_FILE"

                      # IaC Scan Results section
                      printf '<div class="section">\n' >> "$REPORT_FILE"
                      printf '  <div class="section-header"><span class="section-icon">&#128196;</span><h2>Infrastructure as Code (IaC) Scan Results</h2></div>\n' >> "$REPORT_FILE"
                      printf '  <div class="section-body"><div class="stats-grid">\n' >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-total">%s</div><div class="stat-label">Total Findings</div></div>\n' "$IAC_TOTAL" >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-critical">%s</div><div class="stat-label">Critical</div></div>\n' "$IAC_CRITICAL" >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-high">%s</div><div class="stat-label">High</div></div>\n' "$IAC_HIGH" >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-medium">%s</div><div class="stat-label">Medium</div></div>\n' "$IAC_MEDIUM" >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-info">%s</div><div class="stat-label">Informational</div></div>\n' "$IAC_INFO" >> "$REPORT_FILE"
                      printf '  </div></div>\n</div>\n' >> "$REPORT_FILE"

                      # Container Scan Results section
                      printf '<div class="section">\n' >> "$REPORT_FILE"
                      printf '  <div class="section-header"><span class="section-icon">&#128230;</span><h2>Container Image Scan Results</h2></div>\n' >> "$REPORT_FILE"
                      printf '  <div class="section-body"><div class="stats-grid">\n' >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-total">%s</div><div class="stat-label">Total Vulnerabilities</div></div>\n' "$CONT_TOTAL" >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-critical">%s</div><div class="stat-label">Critical</div></div>\n' "$CONT_CRITICAL" >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-high">%s</div><div class="stat-label">High</div></div>\n' "$CONT_HIGH" >> "$REPORT_FILE"
                      printf '    <div class="stat-card"><div class="stat-number color-critical">%s</div><div class="stat-label">Secrets Detected</div></div>\n' "$SECRETS_DETECTED" >> "$REPORT_FILE"
                      printf '  </div></div>\n</div>\n' >> "$REPORT_FILE"

                      # Build and Deployment Status section
                      printf '<div class="section">\n' >> "$REPORT_FILE"
                      printf '  <div class="section-header"><span class="section-icon">&#9881;</span><h2>Build &amp; Deployment Status</h2></div>\n' >> "$REPORT_FILE"
                      printf '  <div class="section-body">\n' >> "$REPORT_FILE"
                      printf '    <div class="status-row"><span class="status-label">Container Build Status</span>%s</div>\n' "$BUILD_BADGE" >> "$REPORT_FILE"
                      printf '    <div class="status-row"><span class="status-label">Application Dependencies</span>%s</div>\n' "$APP_BADGE" >> "$REPORT_FILE"
                      printf '    <div class="status-row"><span class="status-label">Secrets in Image</span>%s</div>\n' "$SECRETS_BADGE" >> "$REPORT_FILE"
                      printf '  </div>\n</div>\n' >> "$REPORT_FILE"

                      # Remediation Plan section
                      printf '<div class="section">\n' >> "$REPORT_FILE"
                      printf '  <div class="section-header"><span class="section-icon">&#128295;</span><h2>Remediation Plan</h2></div>\n' >> "$REPORT_FILE"
                      printf '  <div class="section-body"><div class="remediation-box">%s</div></div>\n' "$REMEDIATION_HTML" >> "$REPORT_FILE"
                      printf '</div>\n' >> "$REPORT_FILE"

                      # Footer
                      printf '<div class="footer">Generated by <strong>CrowdStrike Falcon Cloud Security</strong> &mdash; %s<br/>Pipeline: %s &bull; Execution: %s</div>\n' "$REPORT_DATE" "$PIPELINE_NAME" "$EXECUTION_ID" >> "$REPORT_FILE"
                      printf '</div>\n</body>\n</html>\n' >> "$REPORT_FILE"

                      echo "✓ HTML report generated successfully"
                      echo "Location : $REPORT_FILE"
                      echo "File size: $(du -sh $REPORT_FILE | cut -f1)"
                  timeout: 5m
              - step:
                  type: Run
                  name: Publish HTML Report Artifact
                  identifier: publish_html_report
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine
                    shell: Sh
                    command: |-
                      set +x
                      apk add --no-cache curl > /dev/null 2>&1

                      echo "=== Uploading HTML Report to Harness File Store ==="

                      REPORT_PATH="/harness/scan-results/crowdstrike_security_report.html"

                      if [ ! -f "$REPORT_PATH" ]; then
                        echo "ERROR: HTML report not found at $REPORT_PATH"
                        exit 1
                      fi

                      echo "Report file size: $(du -sh $REPORT_PATH | cut -f1)"

                      EXEC_ID="<+pipeline.executionId>"
                      SAFE_EXEC_ID=$(echo "$EXEC_ID" | tr '-' '_')
                      FILE_IDENTIFIER="cs_security_report_${SAFE_EXEC_ID}"
                      FILE_NAME="crowdstrike_security_report_${EXEC_ID}.html"

                      echo "Uploading: $FILE_NAME"

                      HTTP_STATUS=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
                        -X POST \
                        "https://app.harness.io/ng/api/file-store?accountIdentifier=<+account.identifier>&orgIdentifier=<+org.identifier>&projectIdentifier=<+project.identifier>" \
                        -H "x-api-key: ${HARNESS_API_KEY}" \
                        -H "Accept: application/json" \
                        -F "type=FILE" \
                        -F "mimeType=text/html" \
                        -F "identifier=${FILE_IDENTIFIER}" \
                        -F "name=${FILE_NAME}" \
                        -F "parentIdentifier=Root" \
                        -F "content=@${REPORT_PATH};type=text/html")

                      echo "HTTP Status: $HTTP_STATUS"

                      if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
                        echo ""
                        echo "✓ Report uploaded successfully to Harness File Store"
                        echo "========================================="
                        echo "  HOW TO ACCESS YOUR REPORT"
                        echo "========================================="
                        echo "  1. Go to Harness UI"
                        echo "  2. Navigate to your Project"
                        echo "  3. Click: Setup > File Store"
                        echo "  4. Find file: ${FILE_NAME}"
                        echo "  5. Click the file to download"
                        echo "========================================="
                      elif [ "$HTTP_STATUS" = "409" ]; then
                        echo "File already exists, attempting update..."

                        HTTP_STATUS_PUT=$(curl -s -o /tmp/put_response.txt -w "%{http_code}" \
                          -X PUT \
                          "https://app.harness.io/ng/api/file-store/${FILE_IDENTIFIER}?accountIdentifier=<+account.identifier>&orgIdentifier=<+org.identifier>&projectIdentifier=<+project.identifier>" \
                          -H "x-api-key: ${HARNESS_API_KEY}" \
                          -H "Accept: application/json" \
                          -F "type=FILE" \
                          -F "mimeType=text/html" \
                          -F "identifier=${FILE_IDENTIFIER}" \
                          -F "name=${FILE_NAME}" \
                          -F "parentIdentifier=Root" \
                          -F "content=@${REPORT_PATH};type=text/html")

                        echo "PUT HTTP Status: $HTTP_STATUS_PUT"

                        if [ "$HTTP_STATUS_PUT" = "200" ] || [ "$HTTP_STATUS_PUT" = "201" ]; then
                          echo "✓ Report updated successfully in Harness File Store"
                        else
                          echo "✗ Update failed. Printing base64 fallback to logs..."
                          echo "Run locally: echo '<base64>' | base64 -d > crowdstrike_security_report.html"
                          echo "====START===="
                          base64 "$REPORT_PATH"
                          echo "====END===="
                        fi
                      else
                        echo "✗ Upload failed with HTTP status: $HTTP_STATUS"
                        echo "Printing base64 fallback to logs..."
                        echo "Run locally: echo '<base64>' | base64 -d > crowdstrike_security_report.html"
                        echo "====START===="
                        base64 "$REPORT_PATH"
                        echo "====END===="
                      fi
                    envVariables:
                      HARNESS_API_KEY: <+secrets.getValue("account.HARNESS_API_KEY")>
                  timeout: 5m
